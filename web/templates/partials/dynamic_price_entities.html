<div id="dyn-picker" class="mt-3">
  <p class="text-xs text-slate-500 leading-relaxed mb-3">{{ t('dyn_picker_help') }}</p>
  <form hx-post="api/costs/dynamic" hx-target="#dyn-entities-result" hx-swap="innerHTML">
    <select name="dynamic_price_entity"
            onchange="this.title=this.options[this.selectedIndex].title"
            class="w-full px-2.5 py-1.5 rounded-lg bg-slate-800 border border-slate-600 text-white
                   text-sm focus:outline-none focus:border-brand cursor-pointer">
      <option value="">{{ t('wb_none') }}</option>
      {% for e in entities %}
      <option value="{{ e.entity_id }}" {% if selected == e.entity_id %}selected{% endif %}
              title="{{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %} · {{ e.entity_id }}">
        {{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %} — {{ e.state }}
      </option>
      {% endfor %}
    </select>
    {% if not entities %}
    <p class="text-[11px] text-amber-300/80 mt-2">{{ t('dyn_no_entities') }}</p>
    {% endif %}
    <script>
      document.querySelectorAll('#dyn-picker select').forEach(function (s) {
        var o = s.options[s.selectedIndex];
        if (o) s.title = o.title;
      });
    </script>
    <div class="flex items-center justify-between gap-3 pt-3 mt-1">
      <div id="dyn-entities-result" class="text-xs"></div>
      <button type="submit"
              class="bg-brand text-white text-sm font-semibold rounded-lg px-4 py-2 flex-shrink-0">
        {{ t('costs_save') }}
      </button>
    </div>
  </form>
</div>
