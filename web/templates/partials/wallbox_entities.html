<div class="mt-5 pt-5 border-t border-slate-700">
  <div class="text-sm font-medium text-white mb-3">{{ t('wb_entities_title') }}</div>
  <form hx-post="api/settings/wallbox-entities" hx-target="#wb-entities-result" hx-swap="innerHTML" class="space-y-3">
    {% for role in roles %}
    <div>
      <label class="block text-xs text-slate-400 mb-1">{{ t('wb_role_' + role) }}</label>
      <select name="{{ role }}"
              class="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-white
                     text-sm focus:outline-none focus:border-brand cursor-pointer">
        <option value="">{{ t('wb_none') }}</option>
        {% for e in entities %}
        <option value="{{ e.entity_id }}" {% if mapping.get(role) == e.entity_id %}selected{% endif %}>
          {{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    {% endfor %}
    <div class="flex items-center justify-between gap-3 pt-1">
      <div id="wb-entities-result" class="text-xs"></div>
      <button type="submit"
              class="bg-brand text-white text-sm font-semibold rounded-lg px-4 py-2 flex-shrink-0">
        {{ t('wb_save_entities') }}
      </button>
    </div>
  </form>
</div>
