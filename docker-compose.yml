services:
  leapmotor-mate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_FROM: python:3.12-slim
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/leapmotor_mate.db
      - TZ=Europe/Rome
    restart: unless-stopped
